<!DOCTYPE html>
<html>
<head>
<title>ViralGamesStudio</title>
<style>
body {
  margin: 0;
  background: #0f0f12;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  overflow: hidden;
}

h1 {
  margin-top: 100px;
  font-size: 50px;
}

button {
  padding: 15px 30px;
  background: #00aaff;
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

button:hover {
  background: #0088cc;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}
</style>
</head>
<body>

<h1>VIRALGAMESSTUDIO</h1>
<p>Roblox Developer</p>

<button onclick="alert('Bienvenue Jo 😈')">
Play
</button>

<canvas id="bg"></canvas>

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 120; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speed: Math.random() * 0.7
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#00aaff";

  particles.forEach(p => {
    p.y += p.speed;
    if (p.y > canvas.height) p.y = 0;
    ctx.fillRect(p.x, p.y, p.size, p.size);
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
