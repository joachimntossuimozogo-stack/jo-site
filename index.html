<!DOCTYPE html>
<html>
<head>
<title>Jo Space Clicker</title>
<style>
body {
  margin: 0;
  background: #0b0f1a;
  color: white;
  font-family: Arial;
  text-align: center;
  overflow: hidden;
}

h1 {
  margin-top: 40px;
}

#score {
  font-size: 30px;
  margin: 20px;
}

#timer {
  font-size: 20px;
  margin-bottom: 20px;
}

#gameBtn {
  padding: 20px 40px;
  font-size: 20px;
  border: none;
  border-radius: 12px;
  background: #00aaff;
  color: white;
  cursor: pointer;
}

#gameBtn:hover {
  background: #0088cc;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}
</style>
</head>
<body>

<h1>🚀 SPACE CLICKER</h1>
<div id="score">Score: 0</div>
<div id="timer">Time: 30</div>
<button id="gameBtn">CLICK FAST</button>

<canvas id="bg"></canvas>

<script>
let score = 0;
let timeLeft = 30;
let gameActive = true;

const scoreDisplay = document.getElementById("score");
const timerDisplay = document.getElementById("timer");
const button = document.getElementById("gameBtn");

button.onclick = function() {
  if (gameActive) {
    score++;
    scoreDisplay.innerText = "Score: " + score;
  }
};

let timer = setInterval(function() {
  if (timeLeft > 0) {
    timeLeft--;
    timerDisplay.innerText = "Time: " + timeLeft;
  } else {
    gameActive = false;
    clearInterval(timer);
    button.innerText = "GAME OVER";
    alert("🔥 Final Score: " + score);
  }
}, 1000);

/* Background stars */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 150; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speed: Math.random() * 0.5
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#00aaff";

  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > canvas.height) s.y = 0;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
