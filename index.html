<!DOCTYPE html>
<html>
<head>
<title>Neon Dash Pro</title>
<style>
body{margin:0;overflow:hidden;background:#87CEEB;font-family:Arial}
canvas{display:block}
#ui{
position:absolute;top:20px;left:20px;
font-size:28px;color:black
}
#gameOver{
position:absolute;width:100%;height:100%;
display:none;justify-content:center;
align-items:center;flex-direction:column;
background:rgba(0,0,0,0.6);
color:white;font-size:40px
}
button{
padding:10px 30px;margin-top:20px;
font-size:20px;border:none;border-radius:10px;
cursor:pointer
}
</style>
</head>
<body>

<div id="ui">Score: <span id="score">0</span></div>

<div id="gameOver">
GAME OVER
<button onclick="location.reload()">Restart</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let gravity=1.3;
let speed=6;
let score=0;
let running=true;

let player={
x:150,
y:canvas.height-180,
w:40,
h:80,
dy:0,
grounded:true
};

let obstacles=[];
let buildings=[];

/* CREATE FIXED CITY ONCE */
for(let i=0;i<20;i++){
buildings.push({
x:i*200,
width:120,
height:150+Math.random()*200
});
}

document.addEventListener("keydown",e=>{
if(e.code==="Space"&&player.grounded){
player.dy=-20;
player.grounded=false;
}
});

function spawnObstacle(){
setInterval(()=>{
obstacles.push({
x:canvas.width,
y:canvas.height-140,
w:40,
h:60+Math.random()*40
});
},1800);
}
spawnObstacle();

function update(){
player.dy+=gravity;
player.y+=player.dy;

if(player.y>=canvas.height-180){
player.y=canvas.height-180;
player.grounded=true;
}

buildings.forEach(b=>{
b.x-=speed*0.3;
if(b.x+b.width<0){
b.x=canvas.width+Math.random()*200;
}
});

obstacles.forEach((o,i)=>{
o.x-=speed;

if(
player.x<o.x+o.w &&
player.x+player.w>o.x &&
player.y<o.y+o.h &&
player.y+player.h>o.y
){
running=false;
document.getElementById("gameOver").style.display="flex";
}

if(o.x+o.w<0){
obstacles.splice(i,1);
score++;
speed+=0.2;
document.getElementById("score").innerText=score;
}
});
}

function drawBackground(){
let grad=ctx.createLinearGradient(0,0,0,canvas.height);
grad.addColorStop(0,"#87CEEB");
grad.addColorStop(1,"#E0F7FF");
ctx.fillStyle=grad;
ctx.fillRect(0,0,canvas.width,canvas.height);

/* Sun */
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(canvas.width-120,100,50,0,Math.PI*2);
ctx.fill();
}

function drawCity(){
ctx.fillStyle="#555";
buildings.forEach(b=>{
ctx.fillRect(b.x,canvas.height-100-b.height,b.width,b.height);

/* windows */
ctx.fillStyle="yellow";
for(let i=0;i<4;i++){
ctx.fillRect(b.x+15+i*20,canvas.height-90-b.height+20,10,20);
}
ctx.fillStyle="#555";
});
}

function drawGround(){
ctx.fillStyle="#228B22";
ctx.fillRect(0,canvas.height-100,canvas.width,100);
}

function drawPlayer(){
ctx.fillStyle="black";

/* body */
ctx.fillRect(player.x,player.y,40,60);

/* head */
ctx.beginPath();
ctx.arc(player.x+20,player.y-15,15,0,Math.PI*2);
ctx.fill();

/* legs */
ctx.fillRect(player.x+5,player.y+60,10,30);
ctx.fillRect(player.x+25,player.y+60,10,30);

/* arms */
ctx.fillRect(player.x-10,player.y+10,10,40);
ctx.fillRect(player.x+40,player.y+10,10,40);
}

function drawObstacles(){
ctx.fillStyle="brown";
obstacles.forEach(o=>{
ctx.fillRect(o.x,o.y,o.w,o.h);
});
}

function draw(){
drawBackground();
drawCity();
drawGround();
drawPlayer();
drawObstacles();
}

function loop(){
if(!running)return;
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
