<!DOCTYPE html>
<html>
<head>
<title>City Dash</title>
<style>
body { margin:0; overflow:hidden; font-family:Arial; }
canvas { display:none; }
#menu {
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(#4ec0ff,#87e0ff);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}
h1 { font-size:60px; color:#222; }
button {
  padding:15px 40px;
  margin:10px;
  font-size:20px;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
  cursor:pointer;
}
button:hover { background:#444; }
#creditsBox { display:none; margin-top:15px; font-size:18px; }
</style>
</head>
<body>

<div id="menu">
  <h1>🌆 CITY DASH</h1>
  <button onclick="startGame()">PLAY</button>
  <button onclick="toggleCredits()">CREDITS</button>
  <div id="creditsBox">Dev: @ItsJojoKario</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gravity = 1.2;
let speed = 8;
let score = 0;
let gameRunning = false;

let player = {
  x: 150,
  y: canvas.height - 200,
  width: 50,
  height: 100,
  dy: 0,
  grounded: true
};

let obstacles = [];

function toggleCredits(){
  const box = document.getElementById("creditsBox");
  box.style.display = box.style.display==="none"?"block":"none";
}

function startGame(){
  document.getElementById("menu").style.display="none";
  canvas.style.display="block";
  gameRunning = true;
  spawnObstacle();
  gameLoop();
}

function spawnObstacle(){
  setInterval(()=>{
    obstacles.push({
      x: canvas.width,
      y: canvas.height - 140,
      width: 60,
      height: 60
    });
  },2000);
}

document.addEventListener("keydown",e=>{
  if(e.code==="Space" && player.grounded){
    player.dy = -20;
    player.grounded=false;
  }
});

function update(){
  player.dy += gravity;
  player.y += player.dy;

  if(player.y >= canvas.height - 200){
    player.y = canvas.height - 200;
    player.grounded = true;
  }

  obstacles.forEach((obs,index)=>{
    obs.x -= speed;

    // collision réelle
    if(
      player.x < obs.x + obs.width &&
      player.x + player.width > obs.x &&
      player.y < obs.y + obs.height &&
      player.y + player.height > obs.y
    ){
      alert("GAME OVER\nScore: "+score);
      location.reload();
    }

    if(obs.x + obs.width < 0){
      obstacles.splice(index,1);
      score++;
      speed += 0.2; // vitesse augmente
    }
  });
}

function drawBackground(){
  // ciel
  ctx.fillStyle="#87CEEB";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // ville
  ctx.fillStyle="#555";
  for(let i=0;i<canvas.width;i+=200){
    ctx.fillRect(i,canvas.height-300,150,200);
  }

  // sol
  ctx.fillStyle="#228B22";
  ctx.fillRect(0,canvas.height-100,canvas.width,100);
}

function drawPlayer(){
  // corps
  ctx.fillStyle="black";
  ctx.fillRect(player.x,player.y,player.width,player.height);

  // tête
  ctx.beginPath();
  ctx.arc(player.x+25,player.y-20,20,0,Math.PI*2);
  ctx.fill();

  // jambes
  ctx.fillRect(player.x+5,player.y+100,15,40);
  ctx.fillRect(player.x+30,player.y+100,15,40);
}

function draw(){
  drawBackground();
  drawPlayer();

  ctx.fillStyle="brown";
  obstacles.forEach(obs=>{
    ctx.fillRect(obs.x,obs.y,obs.width,obs.height);
  });

  ctx.fillStyle="black";
  ctx.font="30px Arial";
  ctx.fillText("Score: "+score,20,50);
}

function gameLoop(){
  if(!gameRunning)return;
  update();
  draw();
  requestAnimationFrame(gameLoop);
}
</script>

</body>
</html>
