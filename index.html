<!DOCTYPE html>
<html>
<head>
<title>Urban Escape</title>
<style>
body{margin:0;overflow:hidden;font-family:Arial;background:#111}
canvas{display:none}
#menu{
position:absolute;width:100%;height:100%;
background:linear-gradient(135deg,#1e3c72,#2a5298);
display:flex;flex-direction:column;
justify-content:center;align-items:center;
color:white;text-align:center
}
h1{font-size:70px;margin-bottom:20px}
button{
padding:15px 40px;margin:10px;
font-size:20px;border:none;
border-radius:12px;background:#fff;
cursor:pointer
}
button:hover{background:#ddd}
#credits{display:none;margin-top:15px}

#ui{
position:absolute;top:15px;left:50%;
transform:translateX(-50%);
display:none;
color:white;font-size:22px;
background:rgba(0,0,0,0.5);
padding:10px 25px;border-radius:15px;
}

#gameOver{
position:absolute;width:100%;height:100%;
display:none;justify-content:center;
align-items:center;flex-direction:column;
background:rgba(0,0,0,0.8);
color:white;font-size:40px
}
</style>
</head>
<body>

<div id="menu">
<h1>🏃 URBAN ESCAPE</h1>
<button onclick="startGame()">PLAY</button>
<button onclick="toggleCredits()">CREDITS</button>
<div id="credits">Dev: @ItsJojoKario</div>
</div>

<div id="ui">
Score: <span id="score">0</span> |
Time: <span id="timer">0</span>s
</div>

<div id="gameOver">
GAME OVER
<button onclick="location.reload()">Restart</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let gravity=1.1;
let speed=7;
let score=0;
let timeSurvived=0;
let running=false;

let player={
x:200,
y:canvas.height-220,
w:50,
h:100,
dy:0,
grounded:true,
frame:0
};

let obstacles=[];
let buildings=[];

for(let i=0;i<15;i++){
buildings.push({
x:i*300,
width:150,
height:200+Math.random()*250
});
}

function toggleCredits(){
let c=document.getElementById("credits");
c.style.display=c.style.display==="none"?"block":"none";
}

function startGame(){
document.getElementById("menu").style.display="none";
canvas.style.display="block";
document.getElementById("ui").style.display="block";
running=true;
spawnObstacle();
setInterval(()=>{ if(running){timeSurvived++;document.getElementById("timer").innerText=timeSurvived;} },1000);
loop();
}

function spawnObstacle(){
setInterval(()=>{
let type=Math.floor(Math.random()*3);
obstacles.push({
x:canvas.width,
y:canvas.height-140,
type:type
});
},1800);
}

document.addEventListener("keydown",e=>{
if(e.code==="Space"&&player.grounded){
player.dy=-25; // saut plus haut
player.grounded=false;
}
});

function update(){
player.dy+=gravity;
player.y+=player.dy;

if(player.y>=canvas.height-220){
player.y=canvas.height-220;
player.grounded=true;
}

player.frame+=0.2;

buildings.forEach(b=>{
b.x-=speed*0.3;
if(b.x+b.width<0){
b.x=canvas.width+Math.random()*200;
}
});

obstacles.forEach((o,i)=>{
o.x-=speed;

let ow=60, oh=60;

if(
player.x<o.x+ow &&
player.x+player.w>o.x &&
player.y<canvas.height-140+oh &&
player.y+player.h>canvas.height-140
){
deathAnimation();
}

if(o.x+60<0){
obstacles.splice(i,1);
score++;
speed+=0.2;
document.getElementById("score").innerText=score;
}
});
}

function deathAnimation(){
running=false;
document.getElementById("gameOver").style.display="flex";
}

function drawBackground(){
let grad=ctx.createLinearGradient(0,0,0,canvas.height);
grad.addColorStop(0,"#87CEEB");
grad.addColorStop(1,"#E0F7FF");
ctx.fillStyle=grad;
ctx.fillRect(0,0,canvas.width,canvas.height);

/* sun */
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(canvas.width-150,120,60,0,Math.PI*2);
ctx.fill();
}

function drawCity(){
ctx.fillStyle="#444";
buildings.forEach(b=>{
ctx.fillRect(b.x,canvas.height-100-b.height,b.width,b.height);

/* many windows */
ctx.fillStyle="yellow";
for(let y=0;y<6;y++){
for(let x=0;x<5;x++){
ctx.fillRect(b.x+20+x*25,canvas.height-100-b.height+20+y*30,10,15);
}
}
ctx.fillStyle="#444";
});
}

function drawGround(){
ctx.fillStyle="#2d8f2d";
ctx.fillRect(0,canvas.height-100,canvas.width,100);
}

function drawPlayer(){
/* body */
ctx.fillStyle="#fff";
ctx.fillRect(player.x,player.y,40,60);

/* head */
ctx.fillStyle="#f1c27d";
ctx.beginPath();
ctx.arc(player.x+20,player.y-15,18,0,Math.PI*2);
ctx.fill();

/* hair */
ctx.fillStyle="#5a381e";
ctx.fillRect(player.x+5,player.y-30,30,10);

/* jeans */
ctx.fillStyle="#1e90ff";
ctx.fillRect(player.x,player.y+60,40,40);

/* legs animated */
ctx.fillStyle="black";
let legOffset=Math.sin(player.frame)*10;
ctx.fillRect(player.x+5,player.y+100+legOffset,10,30);
ctx.fillRect(player.x+25,player.y+100-legOffset,10,30);

/* arms */
ctx.fillStyle="#f1c27d";
ctx.fillRect(player.x-10,player.y+10,10,40);
ctx.fillRect(player.x+40,player.y+10,10,40);
}

function drawObstacles(){
obstacles.forEach(o=>{
if(o.type===0){ // barriere
ctx.fillStyle="red";
ctx.fillRect(o.x,canvas.height-140,60,20);
ctx.fillRect(o.x+20,canvas.height-160,20,40);
}
if(o.type===1){ // poubelle
ctx.fillStyle="gray";
ctx.fillRect(o.x,canvas.height-160,50,60);
}
if(o.type===2){ // cone
ctx.fillStyle="orange";
ctx.beginPath();
ctx.moveTo(o.x,canvas.height-100);
ctx.lineTo(o.x+30,canvas.height-160);
ctx.lineTo(o.x+60,canvas.height-100);
ctx.fill();
}
});
}

function draw(){
drawBackground();
drawCity();
drawGround();
drawPlayer();
drawObstacles();
}

function loop(){
if(!running)return;
update();
draw();
requestAnimationFrame(loop);
}
</script>

</body>
</html>
