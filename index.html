<!DOCTYPE html>
<html>
<head>
<title>NEON RUNNER</title>
<style>
body{margin:0;overflow:hidden;font-family:Arial}
canvas{display:none}
#menu{
position:absolute;width:100%;height:100%;
background:linear-gradient(#0f2027,#203a43,#2c5364);
display:flex;flex-direction:column;
justify-content:center;align-items:center;
color:white
}
h1{font-size:70px;margin-bottom:20px}
button{
padding:15px 40px;margin:10px;
font-size:20px;border:none;
border-radius:10px;background:#00c3ff;
cursor:pointer;color:black
}
button:hover{background:#00e0ff}
#credits{display:none;margin-top:15px}
#gameOverScreen{
position:absolute;width:100%;height:100%;
display:none;justify-content:center;
align-items:center;flex-direction:column;
background:rgba(0,0,0,0.7);color:white
}
</style>
</head>
<body>

<div id="menu">
<h1>⚡ NEON RUNNER ⚡</h1>
<button onclick="startGame()">PLAY</button>
<button onclick="toggleCredits()">CREDITS</button>
<div id="credits">Dev: @ItsJojoKario</div>
</div>

<div id="gameOverScreen">
<h1>GAME OVER</h1>
<p id="finalScore"></p>
<button onclick="location.reload()">RESTART</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let gravity=1.2;
let speed=7;
let score=0;
let gameRunning=false;

let player={
x:200,
y:canvas.height-250,
width:60,
height:120,
dy:0,
grounded:true
};

let obstacles=[];
let clouds=[];

function toggleCredits(){
let c=document.getElementById("credits");
c.style.display=c.style.display==="none"?"block":"none";
}

function startGame(){
document.getElementById("menu").style.display="none";
canvas.style.display="block";
gameRunning=true;
spawnObstacle();
spawnClouds();
gameLoop();
}

function spawnObstacle(){
setInterval(()=>{
let type=Math.floor(Math.random()*3);
let height=60+Math.random()*60;
obstacles.push({
x:canvas.width,
y:canvas.height-160,
width:60,
height:height,
type:type
});
},1800);
}

function spawnClouds(){
for(let i=0;i<5;i++){
clouds.push({
x:Math.random()*canvas.width,
y:Math.random()*200,
size:80+Math.random()*50
});
}
}

document.addEventListener("keydown",e=>{
if(e.code==="Space"&&player.grounded){
player.dy=-22;
player.grounded=false;
}
});

function update(){
player.dy+=gravity;
player.y+=player.dy;

if(player.y>=canvas.height-250){
player.y=canvas.height-250;
player.grounded=true;
}

clouds.forEach(c=>{c.x-=1;if(c.x<-100)c.x=canvas.width});

obstacles.forEach((obs,i)=>{
obs.x-=speed;

if(
player.x<obs.x+obs.width &&
player.x+player.width>obs.x &&
player.y<obs.y+obs.height &&
player.y+player.height>obs.y
){
gameOver();
}

if(obs.x+obs.width<0){
obstacles.splice(i,1);
score++;
speed+=0.2;
}
});
}

function gameOver(){
gameRunning=false;
document.getElementById("gameOverScreen").style.display="flex";
document.getElementById("finalScore").innerText="Score: "+score;
}

function drawSky(){
let grad=ctx.createLinearGradient(0,0,0,canvas.height);
grad.addColorStop(0,"#87CEFA");
grad.addColorStop(1,"#ffffff");
ctx.fillStyle=grad;
ctx.fillRect(0,0,canvas.width,canvas.height);
}

function drawSun(){
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(canvas.width-150,100,60,0,Math.PI*2);
ctx.fill();
}

function drawClouds(){
ctx.fillStyle="white";
clouds.forEach(c=>{
ctx.beginPath();
ctx.arc(c.x,c.y,40,0,Math.PI*2);
ctx.arc(c.x+40,c.y,40,0,Math.PI*2);
ctx.fill();
});
}

function drawCity(){
for(let i=0;i<canvas.width;i+=150){
let h=150+Math.random()*150;
ctx.fillStyle="#555";
ctx.fillRect(i,canvas.height-300,h/2,h);
ctx.fillStyle="yellow";
for(let w=0;w<5;w++){
ctx.fillRect(i+10+w*15,canvas.height-280,10,20);
}
}
}

function drawGround(){
ctx.fillStyle="#228B22";
ctx.fillRect(0,canvas.height-100,canvas.width,100);
}

function drawPlayer(){
ctx.fillStyle="black";
ctx.fillRect(player.x,player.y,40,80);
ctx.beginPath();
ctx.arc(player.x+20,player.y-20,20,0,Math.PI*2);
ctx.fill();
ctx.fillRect(player.x-10,player.y+20,10,40);
ctx.fillRect(player.x+40,player.y+20,10,40);
ctx.fillRect(player.x,player.y+80,15,40);
ctx.fillRect(player.x+25,player.y+80,15,40);
}

function drawObstacles(){
obstacles.forEach(obs=>{
if(obs.type===0)ctx.fillStyle="brown";
if(obs.type===1)ctx.fillStyle="red";
if(obs.type===2)ctx.fillStyle="gray";
ctx.fillRect(obs.x,obs.y,obs.width,obs.height);
});
}

function drawScore(){
ctx.fillStyle="black";
ctx.font="30px Arial";
ctx.fillText("Score: "+score,20,50);
}

function draw(){
drawSky();
drawSun();
drawClouds();
drawCity();
drawGround();
drawPlayer();
drawObstacles();
drawScore();
}

function gameLoop(){
if(!gameRunning)return;
update();
draw();
requestAnimationFrame(gameLoop);
}
</script>

</body>
</html>
